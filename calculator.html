<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="calculator.css">

</head>

<body>
    <div class="container">
    
        <div class="item dce" value=""><h2>Calculator</h2></div>

        <button class="item dr"> <input type="text" id="res" value=""> </button>
        <button class="item cn"> <input type="text" id="exp" value=""> </button>


        
        <button class="item" onclick="clearAll()">CA</button>
        <button class="item" onclick="clearElement()">CE</button>


        
        <button class="item" onclick="item('%')" >%</button>
        <button class="item" onclick="item('/')"> /  </button>
        <button class="item" onclick="tem(7)"> 7  </button>
        <button class="item" onclick="item(8)">   8  </button>
        <button class="item" onclick="item(9)">9  </button>
        <button class="item" onclick="item('*')"> *  </button>
        <button class="item" onclick="item(4)">  4  </button>
        <button class="item" onclick="item(5)">  5  </button>
        <button class="item" onclick="item(6)">  6  </button>
        <button class="item" onclick="item('-')">  -  </button>
        <button class="item" onclick="item(1)">  1 </button>
        <button class="item" onclick="item(2)">  2 </button>
        <button class="item" onclick="item(3)">  3  </button>
        <button class="item" onclick="item('+')">  + </button>
        <button class="item" onclick="item(0)" > 0 </button>
        <button class="item" onclick="item('.')">  . </button>

        
        <button class="item equalto" onclick="result()"> = </button>
    </div>

    <script src="calculator.js"></script>
</body>

</html>
